site_name: redress
site_description: Policy-driven failure handling for Python services
site_url: https://aponysus.github.io/redress/
repo_name: aponysus/redress
repo_url: https://github.com/aponysus/redress
docs_dir: docs
theme:
  name: material
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: deep purple
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.snippets:
      base_path: "."
  - pymdownx.highlight
  - pymdownx.superfences
extra_css:
  - stylesheets/nav-hierarchy.css
nav:
  - Overview: index.md
  - Why Redress: blog/why-redress.md
  - Getting started: getting-started.md
  - Core guide:
      - Choose your API: choose-your-api.md
      - Usage: usage.md
      - Pitfalls and defaults: pitfalls-and-defaults.md
      - Migration: migration.md
      - API reference: api.md
  - Concepts:
      - Error classes & classifiers: concepts/error-classes.md
      - Classification: concepts/classification.md
      - Retry strategies: concepts/strategies.md
      - Policies & decorators: concepts/policies-decorators.md
      - Circuit breakers: concepts/circuit-breakers.md
      - Observability: observability.md
      - Safety and resilience: safety-resilience.md
      - Stability and compatibility: stability.md
      - Testing Redress-using code: testing.md
      - Design notes: design_notes.md
  - Recipes:
      - HTTP: recipes/http.md
      - Databases: recipes/db.md
      - Observability: recipes/observability.md
      - Worker/Queue: recipes/workers.md
  - Starter kits:
      - HTTP client with sane defaults: starters/http-client.md
      - Background worker with bounded retries: starters/worker.md
      - 429-aware client with Retry-After: starters/retry-after-client.md
  - Reference flows: reference-flows.md
  - Examples: examples/index.md
  - Comparison: comparison.md
  - Roadmap: roadmap-public.md
  - Changelog: changelog.md
